<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get In Touch | Your Name</title>
    <style>
        :root {
            --primary-color: #f7f7f7;
            --secondary-color: #1a1a1a;
            --accent-color: #fffb00; /* Neon yellow for branding */
            --accent-color-hover: #e0da00;
            --text-color: #1a1a1a;
            --font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--primary-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1000px;
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .left-column {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.05) 0%, rgba(26, 26, 26, 0) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .left-column img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        /* Accent for the branding */
        .left-column::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background-color: var(--accent-color);
            border-radius: 50%;
            opacity: 0.8;
            filter: blur(20px);
        }

        .right-column {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3rem;
            margin: 0 0 10px;
            line-height: 1.1;
            font-weight: 700;
        }

        .header h1::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background-color: var(--accent-color);
            margin-top: 15px;
        }

        .header p {
            font-size: 1.2rem;
            color: #555;
            margin: 0;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: #fafafa;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a1a;
            background-color: var(--accent-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-align: center;
        }

        .btn-submit:hover {
            background-color: var(--accent-color-hover);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #777;
            text-align: center;
        }

        /* Response for smaller devices */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .left-column {
                height: 300px;
            }

            .right-column {
                padding: 40px;
            }

            .header h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-column">
            <img src="portrait.jpg" alt="A photo of me">
        </div>
        <div class="right-column">
            <div class="header">
                <h1>Hello</h1>
                <p>Let's collaborate on something great. Fill out the form below to get in touch!</p>
            </div>
            
            <form action="#" method="post" id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="your.email@example.com" required>
                </div>
                <button type="submit" class="btn-submit">Get In Touch</button>
            </form>

            <div class="footer">
                &copy; 2026. All rights reserved.
            </div>
        </div>
    </div>
    <script>
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents the form from submitting.
            alert('This is a static website, so the form cannot be submitted directly. In a real-world application, you would connect this to a form handling service or backend.');
        });
    </script>
</body>
</html>
